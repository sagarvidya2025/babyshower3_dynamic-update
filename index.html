<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, initial-scale=1">
    <title>Invitation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
        }

        .invitation-card {
            background: white;
            width: 1024px; /* Fixed width for Desktop feel */
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Prevent PNG and Text overlap */
        .intro-section {
            width: 100%;
            position: relative;
            display: block; /* Ensures it takes up its own vertical space */
        }

        .intro-png {
            width: 100%;
            height: auto;
            display: block;
        }

        .text-content {
            width: 90%;
            padding: 40px 0;
            text-align: center;
            /* This ensures a gap between the PNG and the text */
            margin-top: 20px; 
        }

        h4.miracle-heading {
            font-size: 28px;
            color: #333;
            margin: 0 0 30px 0; /* Large bottom margin to prevent overlap with deities */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .deities-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            margin-top: 20px;
            flex-wrap: nowrap; /* Keeps them in one line for the Desktop look */
        }

        .deity-name {
            font-size: 20px;
            font-weight: bold;
            color: #555;
            padding: 10px;
        }

        /* Landscape Orientation Instruction Overlay */
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .icon-rotate {
            width: 80px;
            margin-bottom: 20px;
            filter: invert(1);
        }

        /* Only show the overlay if on mobile AND in portrait */
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #orientation-overlay {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <img src="https://cdn-icons-png.flaticon.com/512/3588/3588278.png" class="icon-rotate" alt="Rotate Icon">
        <h2>Please Rotate Your Phone</h2>
        <p>This invitation is best viewed in Landscape Mode.</p>
    </div>

    <div class="invitation-card">
        <div class="intro-section">
            <img src="intro.png" alt="Intro" class="intro-png">
            </div>

        <div class="text-content">
            <h4 class="miracle-heading">Miracle From Above</h4>

            <div class="deities-container">
                <div class="deity-name">Deity Name 1</div>
                <div class="deity-name">Deity Name 2</div>
                <div class="deity-name">Deity Name 3</div>
            </div>
        </div>
    </div>

    <script>
        // Optional: Force a refresh/check when orientation changes
        window.addEventListener("orientationchange", function() {
            if(window.orientation !== 0) {
                document.getElementById('orientation-overlay').style.display = 'none';
            } else {
                document.getElementById('orientation-overlay').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
